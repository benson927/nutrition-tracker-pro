<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrition Tracker Pro - 成果展示入口</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #000000;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-secondary: #cbd5e1;
            --neon-blue: #6366f1;
            --neon-purple: #a855f7;
            --neon-cyan: #38bdf8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #050505;
            color: var(--text-main);
            font-family: 'Urbanist', 'Noto Sans TC', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto; /* Allow scrolling on small screens */
        }

        /* Ambient Background Shadows */
        body::before {
            content: ''; position: absolute; top: -10%; right: -10%; width: 60%; height: 60%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(0,0,0,0) 70%); z-index: 0;
        }
        body::after {
            content: ''; position: absolute; bottom: -10%; left: -10%; width: 70%; height: 70%;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.1) 0%, rgba(0,0,0,0) 70%); z-index: 0;
        }

        .main-container {
            width: 100%;
            max-width: 1000px;
            z-index: 1;
            text-align: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 40px;
            padding: 80px 60px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
        }

        h1 {
            font-size: 64px;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(to right, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .subtitle {
            font-size: 24px;
            color: var(--text-secondary);
            margin-bottom: 50px;
            font-weight: 400;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 50px;
        }

        .btn {
            padding: 22px 30px;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            border: 1px solid transparent;
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .glass-card {
                padding: 40px 25px;
                border-radius: 30px;
            }
            h1 {
                font-size: 38px;
            }
            .subtitle {
                font-size: 18px;
                margin-bottom: 30px;
            }
            .button-grid {
                grid-template-columns: 1fr; /* Stack buttons vertically */
                gap: 15px;
                margin-bottom: 30px;
            }
            .btn {
                padding: 18px 20px;
                font-size: 16px;
            }
            .modal-container {
                padding: 15px;
                width: 95%;
                height: 80vh;
            }
            .close-btn {
                top: 15px;
                right: 15px;
                width: 36px;
                height: 36px;
            }
        }

        .btn-blue {
            background: rgba(56, 189, 248, 0.08);
            border-color: rgba(56, 189, 248, 0.3);
            color: #7dd3fc;
        }
        .btn-blue:hover { background: rgba(56, 189, 248, 0.15); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(56, 189, 248, 0.2); }

        .btn-purple {
            background: rgba(168, 85, 247, 0.08);
            border-color: rgba(168, 85, 247, 0.3);
            color: #c084fc;
        }
        .btn-purple:hover { background: rgba(168, 85, 247, 0.15); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(168, 85, 247, 0.2); }

        .btn-indigo {
            background: rgba(99, 102, 241, 0.08);
            border-color: rgba(99, 102, 241, 0.3);
            color: #818cf8;
        }
        .btn-indigo:hover { background: rgba(99, 102, 241, 0.15); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(99, 102, 241, 0.2); }

        .btn-pink {
            background: rgba(236, 72, 153, 0.08);
            border-color: rgba(236, 72, 153, 0.3);
            color: #f472b6;
        }
        .btn-pink:hover { background: rgba(236, 72, 153, 0.15); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(236, 72, 153, 0.2); }

        .qr-trigger {
            background: none; border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-secondary); padding: 12px 25px; border-radius: 30px;
            cursor: pointer; transition: all 0.3s ease;
        }
        .qr-trigger:hover { background: rgba(255,255,255,0.05); color: #fff; border-color: rgba(255,255,255,0.3); }

        /* Modal Styles */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal.active { display: flex; animation: fadeIn 0.4s ease; }
        .modal-container {
            width: 90%; max-width: 1200px; height: 85vh;
            background: rgba(30, 30, 30, 0.8); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px; position: relative; padding: 40px;
            display: flex; flex-direction: column; align-items: center;
            transition: all 0.3s ease;
        }
        
        /* Fullscreen specific overrides */
        .modal-container:fullscreen {
            width: 100vw !important;
            height: 100vh !important;
            max-width: none !important;
            max-height: none !important;
            padding: 0 !important;
            border-radius: 0 !important;
            background: #000;
        }

        .modal-body { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        
        /* Ensure iframe and video fill the space */
        .modal-body iframe, .modal-body video {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: inherit;
        }
        .close-btn {
            position: absolute; top: 25px; right: 25px;
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 20px; transition: all 0.3s ease; z-index: 10;
        }
        .close-btn:hover { background: rgba(239, 68, 68, 0.4); border-color: #ef4444; }

        .fullscreen-btn {
            position: absolute; top: 25px; right: 80px;
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 18px; transition: all 0.3s ease; z-index: 10;
        }
        .fullscreen-btn:hover { background: rgba(56, 189, 248, 0.4); border-color: var(--neon-cyan); }

        .copyright {
            margin-top: 40px; font-size: 14px; color: rgba(255,255,255,0.3); letter-spacing: 1px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="glass-card">
            <h1>Nutrition Tracker Pro</h1>
            <p class="subtitle">行動平台開發與成果展示入口</p>
            
            <div class="button-grid">
                <a href="行動平台動機與理念簡報.pdf" target="_blank" onclick="openModal(event, 'motivation')" class="btn btn-blue">
                    <i class="fa-solid fa-lightbulb"></i> 動機與理念簡報
                </a>
                <a href="行動平台技術概念簡報.pdf" target="_blank" onclick="openModal(event, 'technical')" class="btn btn-purple">
                    <i class="fa-solid fa-gears"></i> 技術概念簡報
                </a>
                <a href="https://github.com/benson927/nutrition-tracker-pro" target="_blank" onclick="openModal(event, 'github')" class="btn btn-indigo">
                    <i class="fa-brands fa-github"></i> GitHub 專案原始碼
                </a>
                <a href="行動平台影片v2.mp4" target="_blank" onclick="openModal(event, 'video')" class="btn btn-pink">
                    <i class="fa-solid fa-play"></i> 操作演示影片
                </a>
            </div>

            <button class="qr-trigger" onclick="openModal(event, 'qr')">
                <i class="fa-solid fa-qrcode" style="margin-right: 8px;"></i> 掃描 QR Code 開啟體驗
            </button>

            <p class="copyright">© 2026 Benson Hong. All Rights Reserved.</p>
        </div>
    </div>

    <!-- Universal Modal -->
    <div id="assetModal" class="modal" onclick="closeModal()">
        <div id="modalContainer" class="modal-container" onclick="event.stopPropagation()">
            <button class="fullscreen-btn" onclick="toggleFullscreen()"><i class="fa-solid fa-expand"></i></button>
            <button class="close-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            <div id="modalBody" class="modal-body">
                <!-- Content Injected via JS -->
            </div>
        </div>
    </div>

    <script>
        function openModal(event, type) {
        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        const isSmallScreen = window.innerWidth <= 1180; // Expanded to cover more iPad models
        
        // On touch devices or smaller screens, let the default <a> link behavior take over (open in new tab)
        if (isTouchDevice || isSmallScreen) {
            if (type === 'qr') {
                event.preventDefault();
                // QR still shows in modal as it's an image
            } else if (type === 'video') {
                event.preventDefault();
                // Video still shows in modal
            } else {
                // For PDFs & GitHub, do NOT prevent default, let it open in new tab
                return;
            }
        } else {
            // Deskstop UX: Prevent default link behavior and show modal
            if (type !== 'github') event.preventDefault();
        }

        if (type === 'github') return; // GitHub always opens in new tab

        const body = document.getElementById('modalBody');
        let content = '';
        
        if (type === 'qr') {
                content = `
                    <div style="text-align: center;">
                        <img src="qrcode.png" style="width: 280px; height: 280px; border-radius: 20px; border: 4px solid rgba(255,255,255,0.1); margin-bottom: 25px; box-shadow: 0 0 40px rgba(56, 189, 248, 0.2);">
                        <h2 style="color: var(--neon-cyan); margin-bottom: 15px; font-size: 32px;">即刻體驗</h2>
                        <p style="color: var(--text-secondary); font-size: 18px;">請掃描 QR Code 隨時同步觀看內容</p>
                    </div>
                `;
            } else if (type === 'motivation') {
                content = `<iframe src="行動平台動機與理念簡報.pdf"></iframe>`;
            } else if (type === 'technical') {
                content = `<iframe src="行動平台技術概念簡報.pdf"></iframe>`;
            } else if (type === 'video') {
                content = `
                    <div style="width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                        <video controls autoplay style="max-height: 80vh; max-width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
                            <source src="行動平台影片v2.mp4" type="video/mp4">
                        </video>
                        <h2 style="color: var(--neon-purple); margin-top: 15px; text-align: center; font-size: 24px;">操作演示影片</h2>
                    </div>
                `;
            }
            
            body.innerHTML = content;
            document.getElementById('assetModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('assetModal').classList.remove('active');
            document.getElementById('modalBody').innerHTML = '';
            if (document.fullscreenElement) {
                document.exitFullscreen();
            }
        }

        function toggleFullscreen() {
            const container = document.getElementById('modalContainer');
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => {
                    console.error(`Fullscreen error: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }
    </script>

</body>
</html>
