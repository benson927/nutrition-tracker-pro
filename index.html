<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrition Tracker Pro - 成果展示入口</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-secondary: #cbd5e1;
            --neon-blue: #6366f1;
            --neon-purple: #a855f7;
            --neon-cyan: #38bdf8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #050505;
            color: var(--text-main);
            font-family: 'Urbanist', 'Noto Sans TC', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto; /* Allow scrolling on small screens */
        }

        /* Ambient Background Shadows */
        body::before {
            content: ''; position: absolute; top: -10%; right: -10%; width: 60%; height: 60%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(0,0,0,0) 70%); z-index: 0;
        }
        body::after {
            content: ''; position: absolute; bottom: -10%; left: -10%; width: 70%; height: 70%;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.1) 0%, rgba(0,0,0,0) 70%); z-index: 0;
        }

        .main-container {
            width: 100%;
            max-width: 1000px;
            z-index: 1;
            text-align: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 40px;
            padding: 80px 60px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
        }

        h1 {
            font-size: 64px;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(to right, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .subtitle {
            font-size: 24px;
            color: var(--text-secondary);
            margin-bottom: 50px;
            font-weight: 400;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 50px;
        }

        .btn {
            padding: 22px 30px;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            border: 1px solid transparent;
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .glass-card {
                padding: 40px 25px;
                border-radius: 30px;
            }
            h1 {
                font-size: 38px;
            }
            .subtitle {
                font-size: 18px;
                margin-bottom: 30px;
            }
            .button-grid {
                grid-template-columns: 1fr; /* Stack buttons vertically */
                gap: 15px;
                margin-bottom: 30px;
            }
            .btn {
                padding: 18px 20px;
                font-size: 16px;
            }
            .modal-container {
                padding: 15px;
                width: 95%;
                height: 80vh;
            }
            .close-btn {
                top: 15px;
                right: 15px;
                width: 36px;
                height: 36px;
            }
        }

        .btn-blue {
            background: rgba(56, 189, 248, 0.08);
            border-color: rgba(56, 189, 248, 0.3);
            color: #7dd3fc;
        }
        .btn-blue:hover { background: rgba(56, 189, 248, 0.15); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(56, 189, 248, 0.2); }

        .btn-purple {
            background: rgba(168, 85, 247, 0.08);
            border-color: rgba(168, 85, 247, 0.3);
            color: #c084fc;
        }
        .btn-purple:hover { background: rgba(168, 85, 247, 0.15); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(168, 85, 247, 0.2); }

        .btn-indigo {
            background: rgba(99, 102, 241, 0.08);
            border-color: rgba(99, 102, 241, 0.3);
            color: #818cf8;
        }
        .btn-indigo:hover { background: rgba(99, 102, 241, 0.15); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(99, 102, 241, 0.2); }

        .btn-pink {
            background: rgba(236, 72, 153, 0.08);
            border-color: rgba(236, 72, 153, 0.3);
            color: #f472b6;
        }
        .btn-pink:hover { background: rgba(236, 72, 153, 0.15); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(236, 72, 153, 0.2); }

        .qr-trigger {
            background: none; border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-secondary); padding: 12px 25px; border-radius: 30px;
            cursor: pointer; transition: all 0.3s ease;
        }
        .qr-trigger:hover { background: rgba(255,255,255,0.05); color: #fff; border-color: rgba(255,255,255,0.3); }

        /* Modal Styles */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal.active { display: flex; animation: fadeIn 0.4s ease; }
        .modal-container {
            width: 90%; max-width: 1200px; height: 85vh;
            background: rgba(30, 30, 30, 0.8); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px; position: relative; padding: 40px;
            display: flex; flex-direction: column; align-items: center;
            transition: all 0.3s ease;
        }
        
        /* Fullscreen specific overrides - Comprehensive Support */
        .modal-container:fullscreen,
        .modal-container:-webkit-full-screen,
        .modal-container:-moz-full-screen,
        .modal-container:-ms-fullscreen {
            width: 100vw !important;
            height: 100vh !important;
            max-width: none !important;
            max-height: none !important;
            padding: 0 !important;
            margin: 0 !important;
            border: none !important;
            border-radius: 0 !important;
            background: #000 !important;
            display: flex !important;
            flex-direction: column !important;
        }

        /* Force internal elements to fill 100% in fullscreen */
        .modal-container:fullscreen .modal-body,
        .modal-container:-webkit-full-screen .modal-body {
            width: 100% !important;
            height: 100% !important;
            padding: 0 !important;
        }

        .modal-container:fullscreen iframe,
        .modal-container:-webkit-full-screen iframe,
        .modal-container:fullscreen video,
        .modal-container:-webkit-full-screen video {
            width: 100% !important;
            height: 100% !important;
            max-width: none !important;
            max-height: none !important;
            border-radius: 0 !important;
        }

        /* QR Scaling in Fullscreen */
        .modal-container:fullscreen .qr-image,
        .modal-container:-webkit-full-screen .qr-image {
            width: 60vh !important;
            height: 60vh !important;
        }
        .modal-container:fullscreen .qr-title,
        .modal-container:-webkit-full-screen .qr-title {
            font-size: 64px !important;
        }
        .modal-container:fullscreen .qr-desc,
        .modal-container:-webkit-full-screen .qr-desc {
            font-size: 32px !important;
        }

        .modal-body { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; /* Align to top for snapping */
            overflow-y: auto;
            scroll-snap-type: y mandatory; /* Force snapping to pages */
            -webkit-overflow-scrolling: touch;
        }
        
        /* Default behaviors for iframe and video */
        .modal-body iframe {
            width: 100%;
            height: 100%;
            min-height: 100%; /* Force height for snapping */
            border: none;
            scroll-snap-align: start;
        }

        .modal-body video {
            width: 100%;
            max-height: 80vh;
            border-radius: 20px;
        }

        /* PDF.js Viewer Styles */
        #pdf-canvas {
            max-width: 100%;
            max-height: 100%;
            display: block;
            margin: auto;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            background: #222;
        }
        
        .pdf-controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 10px 25px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 20;
            transition: opacity 0.3s;
        }
        
        .pdf-btn {
            background: none; border: none; color: #fff; cursor: pointer;
            font-size: 20px; opacity: 0.7; transition: all 0.2s;
        }
        .pdf-btn:hover { opacity: 1; transform: scale(1.2); color: var(--neon-cyan); }
        .pdf-btn:disabled { opacity: 0.2; cursor: not-allowed; }
        
        #page-num-display { font-size: 14px; min-width: 60px; color: var(--text-secondary); }
        .close-btn {
            position: absolute; top: 25px; right: 25px;
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 20px; transition: all 0.3s ease; z-index: 10;
        }
        .close-btn:hover { background: rgba(239, 68, 68, 0.4); border-color: #ef4444; }

        .fullscreen-btn {
            position: absolute; top: 25px; right: 80px;
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 18px; transition: all 0.3s ease; z-index: 10;
        }
        .fullscreen-btn:hover { background: rgba(56, 189, 248, 0.4); border-color: var(--neon-cyan); }

        .copyright {
            margin-top: 40px; font-size: 14px; color: rgba(255,255,255,0.3); letter-spacing: 1px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="glass-card">
            <h1>Nutrition Tracker Pro</h1>
            <p class="subtitle">行動平台開發與成果展示入口</p>
            
            <div class="button-grid">
                <a href="行動平台動機與理念簡報.pdf#view=Fit" target="_blank" onclick="openModal(event, 'motivation')" class="btn btn-blue">
                    <i class="fa-solid fa-lightbulb"></i> 動機與理念簡報
                </a>
                <a href="行動平台技術概念簡報.pdf#view=Fit" target="_blank" onclick="openModal(event, 'technical')" class="btn btn-purple">
                    <i class="fa-solid fa-gears"></i> 技術概念簡報
                </a>
                <a href="https://github.com/benson927/nutrition-tracker-pro" target="_blank" onclick="openModal(event, 'github')" class="btn btn-indigo">
                    <i class="fa-brands fa-github"></i> GitHub 專案原始碼
                </a>
                <a href="行動平台影片v2.mp4" target="_blank" onclick="openModal(event, 'video')" class="btn btn-pink">
                    <i class="fa-solid fa-play"></i> 操作演示影片
                </a>
            </div>

            <button class="qr-trigger" onclick="openModal(event, 'qr')">
                <i class="fa-solid fa-qrcode" style="margin-right: 8px;"></i> 掃描 QR Code 開啟體驗
            </button>

            <p class="copyright">© 2026 Benson Hong. All Rights Reserved.</p>
        </div>
    </div>

    <!-- Universal Modal -->
    <div id="assetModal" class="modal" onclick="closeModal()">
        <div id="modalContainer" class="modal-container" onclick="event.stopPropagation()">
            <button class="fullscreen-btn" onclick="toggleFullscreen()"><i class="fa-solid fa-expand"></i></button>
            <button class="close-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            <div id="modalBody" class="modal-body">
                <!-- Content Injected via JS -->
            </div>
            <!-- Custom PDF Controls (Hidden by default) -->
            <div id="pdfControls" class="pdf-controls" style="display: none;">
                <button id="prev-page" class="pdf-btn"><i class="fa-solid fa-chevron-left"></i></button>
                <div id="page-num-display"><span id="page_num">0</span> / <span id="page_count">0</span></div>
                <button id="next-page" class="pdf-btn"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pdfDoc = null,
            pageNum = 1,
            pageRendering = false,
            pageNumPending = null,
            canvas = null,
            ctx = null,
            currentType = null;

        // Render a single page (used in Fullscreen/Slide mode)
        function renderSinglePage(num) {
            pageRendering = true;
            pdfDoc.getPage(num).then((page) => {
                const viewport = page.getViewport({ scale: 1 });
                const containerWidth = window.innerWidth - 40;
                const containerHeight = window.innerHeight - 40;
                
                const scale = Math.min(containerWidth / viewport.width, containerHeight / viewport.height);
                const scaledViewport = page.getViewport({ scale: scale });

                canvas.height = scaledViewport.height;
                canvas.width = scaledViewport.width;

                const renderContext = { canvasContext: ctx, viewport: scaledViewport };
                page.render(renderContext).promise.then(() => {
                    pageRendering = false;
                    if (pageNumPending !== null) {
                        renderSinglePage(pageNumPending);
                        pageNumPending = null;
                    }
                });
            });

            document.getElementById('page_num').textContent = num;
            document.getElementById('prev-page').disabled = (num <= 1);
            document.getElementById('next-page').disabled = (num >= pdfDoc.numPages);
        }

        // Render all pages (used in Normal/Scroll mode)
        async function renderAllPages() {
            const body = document.getElementById('modalBody');
            body.innerHTML = '<div id="scroll-wrapper" style="width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 20px;"></div>';
            const wrapper = document.getElementById('scroll-wrapper');

            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({ scale: 1.5 }); // High quality for scrolling
                const canvas_ = document.createElement('canvas');
                canvas_.className = 'pdf-scroll-page';
                canvas_.style.width = '100%';
                canvas_.style.maxWidth = '1000px';
                canvas_.style.boxShadow = '0 10px 30px rgba(0,0,0,0.5)';
                canvas_.style.marginBottom = '20px';
                
                const context = canvas_.getContext('2d');
                canvas_.height = viewport.height;
                canvas_.width = viewport.width;

                await page.render({ canvasContext: context, viewport: viewport }).promise;
                wrapper.appendChild(canvas_);
            }
        }

        function queueRenderPage(num) {
            if (pageRendering) pageNumPending = num;
            else renderSinglePage(num);
        }

        document.getElementById('prev-page').addEventListener('click', () => {
            if (pageNum <= 1) return;
            pageNum--;
            queueRenderPage(pageNum);
        });

        document.getElementById('next-page').addEventListener('click', () => {
            if (pageNum >= pdfDoc.numPages) return;
            pageNum++;
            queueRenderPage(pageNum);
        });

        // Mode Switching Logic
        document.addEventListener('fullscreenchange', () => {
            if (!pdfDoc) return;
            const controls = document.getElementById('pdfControls');
            const body = document.getElementById('modalBody');

            if (document.fullscreenElement) {
                // Fullscreen: Slide Mode
                body.innerHTML = '<canvas id="pdf-canvas"></canvas>';
                canvas = document.getElementById('pdf-canvas');
                ctx = canvas.getContext('2d');
                controls.style.display = 'flex';
                renderSinglePage(pageNum);
            } else {
                // Return to Normal: Scroll Mode
                controls.style.display = 'none';
                renderAllPages();
            }
        });

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('assetModal').classList.contains('active') || !document.fullscreenElement) return;
            if (e.key === 'ArrowRight' || e.key === ' ') {
                if (pdfDoc && pageNum < pdfDoc.numPages) { pageNum++; queueRenderPage(pageNum); }
            } else if (e.key === 'ArrowLeft') {
                if (pdfDoc && pageNum > 1) { pageNum--; queueRenderPage(pageNum); }
            }
        });

        function openModal(event, type) {
            const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
            const isSmallScreen = window.innerWidth <= 1180;
            
            if (isTouchDevice || isSmallScreen) {
                if (type === 'qr' || type === 'video') event.preventDefault();
                else return;
            } else {
                if (type !== 'github') event.preventDefault();
            }

            if (type === 'github') return;

            const body = document.getElementById('modalBody');
            const controls = document.getElementById('pdfControls');
            const fullscreenBtn = document.querySelector('.fullscreen-btn');
            body.innerHTML = '';
            controls.style.display = 'none';
            fullscreenBtn.style.display = 'flex'; // Enable fullscreen for all assets
            currentType = type;
            
            if (type === 'qr') {
                body.innerHTML = `<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center;">
                    <img src="qrcode.png" class="qr-image" style="width: 280px; height: 280px; border-radius: 20px; border: 4px solid rgba(255,255,255,0.1); margin-bottom: 25px; box-shadow: 0 0 40px rgba(56, 189, 248, 0.2); transition: all 0.4s ease;">
                    <h2 class="qr-title" style="color: var(--neon-cyan); margin-bottom: 15px; font-size: 32px; transition: all 0.4s ease;">即刻體驗</h2>
                    <p class="qr-desc" style="color: var(--text-secondary); font-size: 18px; transition: all 0.4s ease;">請掃描 QR Code 隨時同步觀看內容</p></div>`;
            } else if (type === 'motivation' || type === 'technical') {
                const pdfUrl = type === 'motivation' ? '行動平台動機與理念簡報.pdf' : '行動平台技術概念簡報.pdf';
                body.innerHTML = '<div style="color: var(--neon-cyan); font-size: 18px;">載入資源中...</div>';
                
                pdfjsLib.getDocument(pdfUrl).promise.then((pdfDoc_) => {
                    pdfDoc = pdfDoc_;
                    document.getElementById('page_count').textContent = pdfDoc.numPages;
                    pageNum = 1;
                    renderAllPages(); // Start in scrolling mode
                });
            } else if (type === 'video') {
                body.innerHTML = `<div style="width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                    <video controls autoplay style="max-height: 80vh; max-width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
                        <source src="行動平台影片v2.mp4" type="video/mp4"></video>
                    <h2 style="color: var(--neon-purple); margin-top: 15px; text-align: center; font-size: 24px;">操作演示影片</h2></div>`;
            }
            
            document.getElementById('assetModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('assetModal').classList.remove('active');
            document.getElementById('modalBody').innerHTML = '';
            document.getElementById('pdfControls').style.display = 'none';
            pdfDoc = null;
            if (document.fullscreenElement) document.exitFullscreen();
        }

        function toggleFullscreen() {
            const container = document.getElementById('modalContainer');
            if (!document.fullscreenElement) {
                container.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>

</body>
</html>
