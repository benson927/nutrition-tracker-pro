<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrition Tracker Pro - 成果展示入口</title>
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Gaegu:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            --bg-color: #fdfbf7;
            --paper-grid: rgba(220, 215, 200, 0.4);
            --text-main: #2d3436;
            --text-secondary: #636e72;
            --glass-bg: rgba(255, 255, 245, 0.9);
            --glass-border: #333333;
            --neon-blue: #74b9ff;
            --neon-purple: #a29bfe;
            --neon-cyan: #55efc4;
            --neon-pink: #fab1a0;
            --neon-indigo: #81ecec;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(var(--paper-grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--paper-grid) 1px, transparent 1px);
            background-size: 30px 30px;
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Gaegu', 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* Clean up ambient background shadows for sketch feel */
        body::before, body::after { display: none; }

        .main-container {
            width: 100%;
            max-width: 1000px;
            z-index: 1;
            text-align: center;
        }

        .glass-card {
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            /* Hand-drawn irregular border */
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            padding: 80px 60px;
            box-shadow: 10px 15px 0px rgba(0,0,0,0.05);
            width: 100%;
            position: relative;
            transform-origin: top center; /* Physical pivot point */
            animation: float 6s ease-in-out infinite;
        }

        /* Hand-drawn Thumbtack - Enlarged */
        .thumbtack {
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            width: 44px;
            height: 44px;
            background: #ff7675;
            border: 3px solid var(--border-ink);
            border-radius: 50% 45% 55% 40% / 45% 55% 45% 55%;
            z-index: 20;
            box-shadow: 3px 6px 0px rgba(0,0,0,0.2);
        }
        .thumbtack::after {
            content: '';
            position: absolute;
            top: 25%;
            left: 25%;
            width: 12px;
            height: 12px;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(5px) rotate(2deg); }
        }

        @keyframes drop {
            0%, 100% { transform: translateX(-8px) translateY(8px); }
            50% { transform: translateX(8px) translateY(8px); }
        }

        @keyframes pin-shake {
            0%, 100% { transform: rotate(-5deg) translateY(0); }
            50% { transform: rotate(10deg) translateY(-5px); }
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.05) rotate(2deg); }
        }

        @keyframes blink {
            0%, 5%, 15%, 25%, 100% { transform: scaleY(0); opacity: 0; }
            8%, 12%, 18%, 22% { transform: scaleY(1.2); opacity: 1; }
        }

        h1 {
            font-family: 'Architects Daughter', cursive;
            font-size: 64px;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--text-main);
            letter-spacing: -1px;
            line-height: 1.1;
            display: inline-block;
            animation: drop 6s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
            will-change: transform;
        }

        .subtitle {
            font-size: 24px;
            color: var(--text-secondary);
            margin-bottom: 50px;
            font-weight: 400;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 50px;
        }

        .btn {
            padding: 22px 30px;
            border-radius: 125px 15px 105px 15px/15px 105px 15px 125px; /* Sketchy button shape */
            font-size: 19px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            border: 2px solid var(--glass-border);
            box-shadow: 4px 4px 0px var(--glass-border); /* Hand-inked solid shadow */
            position: relative;
            background: #fff;
            color: var(--text-main);
        }

        .btn:hover {
            transform: scale(1.03) translate(-2px, -2px);
            box-shadow: 8px 8px 0px var(--glass-border);
        }

        .btn-blue { background-color: #d1f3ff !important; }
        .btn-purple { background-color: #e3d9ff !important; }
        .btn-indigo { background-color: #d7e4ff !important; }
        .btn-pink { background-color: #ffdce5 !important; }
        .btn-gallery { 
            background-color: #fff4d1 !important; 
            grid-column: span 2 !important; 
            color: var(--text-main) !important;
        }

        .btn i {
            font-size: 22px;
            color: var(--text-main) !important;
        }

        .qr-trigger {
            background: var(--glass-border) !important;
            border: 2px solid var(--glass-border);
            color: var(--bg-color) !important;
            padding: 14px 35px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 30px;
            font-family: 'Gaegu', cursive;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
        }

        .qr-trigger:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 6px 6px 0px rgba(0,0,0,0.15);
            background: #222 !important;
        }

        .qr-trigger i {
            color: var(--bg-color) !important;
        }

        .copyright {
            margin-top: 40px;
            color: var(--text-secondary);
            font-size: 14px;
            font-family: 'Gaegu', cursive;
        }

        /* Modal Styles - Sketch Adaptive */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(253, 251, 247, 0.8); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal.active { display: flex; animation: fadeIn 0.4s ease; }
        .modal-container {
            width: 90%; max-width: 1200px; height: 85vh;
            background: #2d3436; /* Match QR button deep ink color */
            border: 3px solid rgba(255,255,255,0.2);
            border-radius: 15px 225px 15px 255px/255px 15px 225px 15px;
            position: relative; padding: 40px;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 20px 20px 60px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            color: var(--bg-color); /* Invert text to light */
        }
        
        /* Fullscreen specific overrides - Comprehensive Support */
        .modal-container:fullscreen,
        .modal-container:-webkit-full-screen,
        .modal-container:-moz-full-screen,
        .modal-container:-ms-fullscreen {
            width: 100vw !important;
            height: 100vh !important;
            max-width: none !important;
            max-height: none !important;
            padding: 0 !important;
            margin: 0 !important;
            border: none !important;
            border-radius: 0 !important;
            background: #000 !important;
            display: flex !important;
            flex-direction: column !important;
        }

        /* Force internal elements to fill 100% in fullscreen */
        .modal-container:fullscreen .modal-body,
        .modal-container:-webkit-full-screen .modal-body {
            width: 100% !important;
            height: 100% !important;
            padding: 0 !important;
        }

        .modal-container:fullscreen iframe,
        .modal-container:-webkit-full-screen iframe,
        .modal-container:fullscreen video,
        .modal-container:-webkit-full-screen video {
            width: 100% !important;
            height: 100% !important;
            max-width: none !important;
            max-height: none !important;
            border-radius: 0 !important;
        }

        /* QR Scaling in Fullscreen */
        .modal-container:fullscreen .qr-image,
        .modal-container:-webkit-full-screen .qr-image {
            width: 60vh !important;
            height: 60vh !important;
        }
        .modal-container:fullscreen .qr-title,
        .modal-container:-webkit-full-screen .qr-title {
            font-size: 64px !important;
        }
        .modal-container:fullscreen .qr-desc,
        .modal-container:-webkit-full-screen .qr-desc {
            font-size: 32px !important;
        }

        /* Modal Header Actions - High Visibility Sketch */
        .modal-header-actions {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 15px;
            z-index: 1010;
        }
        .action-btn {
            width: 46px; 
            height: 46px; 
            border-radius: 50% 45% 55% 40% / 45% 55% 45% 55%;
            background: rgba(255,255,255,0.1); 
            border: 2px solid rgba(255,255,255,0.3);
            color: #fff !important; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 20px; 
            box-shadow: 4px 4px 0px rgba(0,0,0,0.4);
        }
        .action-btn:hover {
            transform: scale(1.15) rotate(8deg);
            background: rgba(255,255,255,0.2);
            box-shadow: 6px 6px 0px rgba(0,0,0,0.6);
            border-color: var(--neon-cyan);
        }
        .action-btn i { color: #fff !important; }

        .modal-body { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; /* Align to top for snapping */
            overflow-y: auto;
            color: #fff;
            scroll-snap-type: y mandatory; /* Force snapping to pages */
            -webkit-overflow-scrolling: touch;
        }
        
        /* Default behaviors for iframe and video */
        .modal-body iframe {
            width: 100%;
            height: 100%;
            min-height: 100%; /* Force height for snapping */
            border: none;
            scroll-snap-align: start;
        }

        .modal-body video {
            width: 100%;
            max-height: 80vh;
            border-radius: 20px;
        }

        /* PDF.js Viewer Styles */
        #pdf-canvas {
            max-width: 100%;
            max-height: 100%;
            display: block;
            margin: auto;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            background: #222;
        }
        
        .pdf-controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 25px;
            border-radius: 40px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 10;
            color: #fff;
            font-family: 'Gaegu', cursive;
        }
        
        .pdf-btn {
            background: none; border: none; color: #fff; cursor: pointer;
            font-size: 20px; opacity: 0.7; transition: all 0.2s;
        }
        .pdf-btn:hover { opacity: 1; transform: scale(1.2); color: var(--neon-cyan); }
        .pdf-btn:disabled { opacity: 0.2; cursor: not-allowed; }
        
        .modal-header-actions {
            position: absolute;
            top: 25px;
            right: 25px;
            display: flex;
            gap: 12px;
            z-index: 1000;
        }

        /* Essential: Maintain button position in Fullscreen */
        .modal-container:fullscreen .modal-header-actions,
        .modal-container:-webkit-full-screen .modal-header-actions {
            position: fixed !important;
            top: 25px !important;
            right: 25px !important;
        }

        .action-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }

        .btn-close:hover {
            background: rgba(239, 68, 68, 0.6) !important;
            border-color: #ef4444 !important;
        }
        
        .btn-fullscreen {
            display: none; /* Hidden by default to prevent flashing */
        }
        
        .btn-fullscreen:hover {
            background: rgba(56, 189, 248, 0.6) !important;
            border-color: var(--neon-cyan) !important;
        }

        .copyright {
            margin-top: 40px; font-size: 14px; color: rgba(255,255,255,0.3); letter-spacing: 1px;
        }

        .btn-gallery {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
            grid-column: span 2; /* Full width button */
            margin-top: 10px;
        }
        .btn-gallery:hover { 
            background: rgba(255, 255, 255, 0.12); 
            transform: translateY(-5px); 
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1); 
            border-color: rgba(255, 255, 255, 0.4);
        }

        /* Gallery Slider Styles */
        .gallery-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .gallery-image {
            max-width: 90%;
            max-height: 80vh;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            display: none;
            animation: fadeIn 0.5s ease;
        }
        .gallery-image.active {
            display: block;
        }
        .gallery-nav {
            position: absolute;
            bottom: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(0,0,0,0.6);
            padding: 12px 25px;
            border-radius: 40px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        /* Pagination Dots */
        .dot {
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        .dot.active {
            width: 24px;
            border-radius: 10px;
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        /* Gallery Scrolling Style */
        .gallery-scroll-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 40px;
            padding: 40px 20px;
            align-items: center;
        }
        .gallery-scroll-item {
            width: 100%;
            max-width: 900px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Developmental History Button - Inside Glass Card */
        .fab-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 48px;
            height: 48px;
            background: #fff;
            border: 2px solid var(--glass-border);
            border-radius: 50% 45% 55% 40% / 45% 55% 45% 55%; /* Wobbly circle */
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--glass-border);
            text-decoration: none;
            transition: all 0.3s ease;
            z-index: 10;
            cursor: pointer;
            box-shadow: 3px 3px 0px var(--glass-border);
            animation: pin-shake 6s ease-in-out infinite;
            will-change: transform;
        }

        .fab-btn:hover {
            transform: scale(1.1) rotate(15deg);
            background: #fff;
            box-shadow: 5px 5px 0px var(--glass-border);
        }

        .fab-btn i {
            font-size: 18px;
            color: var(--glass-border);
        }

        /* Tooltip style - Permanently Visible */
        .fab-btn::after {
            content: "開發歷程";
            position: absolute;
            right: 60px;
            background: var(--glass-border);
            padding: 4px 12px;
            border-radius: 5px;
            font-size: 13px;
            white-space: nowrap;
            opacity: 1; /* Always visible */
            pointer-events: none;
            transition: all 0.3s ease;
            color: #fff;
            font-family: 'Gaegu', cursive;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.2);
        }
        .fab-btn:hover::after {
            transform: scale(1.05);
            right: 65px;
        }

        /* Moomin Mascot - Enlarged & Animated */
        .moomin-container {
            position: absolute;
            bottom: -50px;
            left: -60px;
            width: 320px; /* MEGA SIZE */
            z-index: 5;
            pointer-events: none;
            animation: breathe 5s ease-in-out infinite;
            filter: drop-shadow(5px 5px 15px rgba(0,0,0,0.1));
            mix-blend-mode: multiply;
        }

        .moomin-img {
            width: 100%;
            height: auto;
            display: block;
        }

        .moomin-eyelid {
            position: absolute;
            top: 29.5%; /* Consistent percentage */
            left: 57.5%;
            width: 22px; /* Scaled width for 320px img */
            height: 12px;
            background: #fdfbf7; 
            border-radius: 50%;
            transform-origin: center;
            animation: blink 3.5s ease-in-out infinite;
            z-index: 6;
            transform: scaleY(0);
            border: 1px solid rgba(0,0,0,0.2);
        }

        @media (max-width: 768px) {
            .glass-card {
                padding: 40px 20px;
                border-radius: 120px 15px 100px 15px/15px 100px 15px 120px;
            }
            h1 { font-size: 42px; }
            .subtitle { font-size: 18px; margin-bottom: 30px; }
            .button-grid { grid-template-columns: 1fr; gap: 15px; }
            .dot { width: 6px; height: 6px; }
            .dot.active { width: 16px; }
            .fab-btn {
                top: 15px;
                right: 15px;
                width: 40px;
                height: 40px;
            }
            .fab-btn::after { display: none; }

            /* Mobile-specific mascot adjustments */
            .moomin-container {
                width: 120px;
                bottom: -15px;
                left: -15px;
                z-index: 1; /* Below buttons */
            }
            
            .qr-trigger {
                margin-top: 40px;
                width: 100%;
                justify-content: center;
                z-index: 10;
            }
            .btn-gallery {
                z-index: 10;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="glass-card">
            <!-- Thumbtack at the top -->
            <div class="thumbtack"></div>
            
            <!-- Development History Button -->
            <a href="開發過程經歷簡報.pdf" target="_blank" onclick="openModal(event, 'history')" class="fab-btn" title="開發歷程紀錄">
                <i class="fa-solid fa-scroll"></i>
            </a>

            <!-- Moomin Mascot Component with Blink -->
            <div class="moomin-container">
                <div class="moomin-eyelid"></div>
                <img src="moomin.png" class="moomin-img" alt="Moomin">
            </div>
            
            <h1>Nutrition Tracker Pro</h1>
            <h2 style="font-size: 28px; font-weight: 600; margin-top: -5px; margin-bottom: 25px; color: var(--text-secondary); letter-spacing: 1px;">營養大師：專業熱量追蹤平台</h2>
            
            <p class="subtitle">行動平台開發與成果展示入口</p>
            
            <div class="button-grid">
                <a href="行動平台動機與理念簡報.pdf#view=Fit" target="_blank" onclick="openModal(event, 'motivation')" class="btn btn-blue">
                    <i class="fa-solid fa-lightbulb"></i> 動機與理念簡報
                </a>
                <a href="行動平台技術概念簡報.pdf#view=Fit" target="_blank" onclick="openModal(event, 'technical')" class="btn btn-purple">
                    <i class="fa-solid fa-gears"></i> 技術概念簡報
                </a>
                <a href="https://github.com/benson927/nutrition-tracker-pro" target="_blank" onclick="openModal(event, 'github')" class="btn btn-indigo">
                    <i class="fa-brands fa-github"></i> GitHub 專案原始碼
                </a>
                <a href="行動平台影片v2.mp4" target="_blank" onclick="openModal(event, 'video')" class="btn btn-pink">
                    <i class="fa-solid fa-play"></i> 操作演示影片
                </a>
                <a href="gallery.html" target="_blank" onclick="openModal(event, 'gallery')" class="btn btn-gallery">
                    <i class="fa-solid fa-images"></i> 核心功能介面預覽
                </a>
            </div>

            <button class="qr-trigger" onclick="openModal(event, 'qr')">
                <i class="fa-solid fa-qrcode" style="margin-right: 8px;"></i> 掃描 QR Code 開啟體驗
            </button>

            <p class="copyright">© 2026 Benson Hong. All Rights Reserved.</p>
        </div>
    </div>

    <!-- Universal Modal -->
    <div id="assetModal" class="modal" onclick="closeModal()">
        <div id="modalContainer" class="modal-container" onclick="event.stopPropagation()">
            <div class="modal-header-actions">
                <button id="fullscreenBtn" class="action-btn btn-fullscreen" onclick="toggleFullscreen()"><i class="fa-solid fa-expand"></i></button>
                <button class="action-btn btn-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="modalBody" class="modal-body">
                <!-- Content Injected via JS -->
            </div>
            <!-- Custom PDF Controls (Hidden by default) -->
            <div id="pdfControls" class="pdf-controls" style="display: none;">
                <button id="prev-page" class="pdf-btn"><i class="fa-solid fa-chevron-left"></i></button>
                <div id="page-num-display"><span id="page_num">0</span> / <span id="page_count">0</span></div>
                <button id="next-page" class="pdf-btn"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pdfDoc = null,
            pageNum = 1,
            pageRendering = false,
            pageNumPending = null,
            canvas = null,
            ctx = null,
            currentType = null;

        // Render a single page (used in Fullscreen/Slide mode)
        function renderSinglePage(num) {
            pageRendering = true;
            pdfDoc.getPage(num).then((page) => {
                const viewport = page.getViewport({ scale: 1 });
                const containerWidth = window.innerWidth - 40;
                const containerHeight = window.innerHeight - 40;
                
                const scale = Math.min(containerWidth / viewport.width, containerHeight / viewport.height);
                const scaledViewport = page.getViewport({ scale: scale });

                canvas.height = scaledViewport.height;
                canvas.width = scaledViewport.width;

                const renderContext = { canvasContext: ctx, viewport: scaledViewport };
                page.render(renderContext).promise.then(() => {
                    pageRendering = false;
                    if (pageNumPending !== null) {
                        renderSinglePage(pageNumPending);
                        pageNumPending = null;
                    }
                });
            });

            document.getElementById('page_num').textContent = num;
            document.getElementById('prev-page').disabled = (num <= 1);
            document.getElementById('next-page').disabled = (num >= pdfDoc.numPages);
        }

        // Render all pages (used in Normal/Scroll mode)
        async function renderAllPages() {
            const body = document.getElementById('modalBody');
            body.innerHTML = '<div id="scroll-wrapper" style="width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 20px;"></div>';
            const wrapper = document.getElementById('scroll-wrapper');

            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({ scale: 1.5 }); // High quality for scrolling
                const canvas_ = document.createElement('canvas');
                canvas_.className = 'pdf-scroll-page';
                canvas_.style.width = '100%';
                canvas_.style.maxWidth = '1000px';
                canvas_.style.boxShadow = '0 10px 30px rgba(0,0,0,0.5)';
                canvas_.style.marginBottom = '20px';
                
                const context = canvas_.getContext('2d');
                canvas_.height = viewport.height;
                canvas_.width = viewport.width;

                await page.render({ canvasContext: context, viewport: viewport }).promise;
                wrapper.appendChild(canvas_);
            }
        }

        function queueRenderPage(num) {
            if (pageRendering) pageNumPending = num;
            else renderSinglePage(num);
        }

        document.getElementById('prev-page').addEventListener('click', () => {
            if (pageNum <= 1) return;
            pageNum--;
            queueRenderPage(pageNum);
        });

        document.getElementById('next-page').addEventListener('click', () => {
            if (pageNum >= pdfDoc.numPages) return;
            pageNum++;
            queueRenderPage(pageNum);
        });

        // Mode Switching Logic
        document.addEventListener('fullscreenchange', () => {
            const controls = document.getElementById('pdfControls');
            const body = document.getElementById('modalBody');

            if (currentType === 'motivation' || currentType === 'technical') {
                if (document.fullscreenElement) {
                    body.innerHTML = '<canvas id="pdf-canvas"></canvas>';
                    canvas = document.getElementById('pdf-canvas');
                    ctx = canvas.getContext('2d');
                    controls.style.display = 'flex';
                    renderSinglePage(pageNum);
                } else {
                    controls.style.display = 'none';
                    renderAllPages();
                }
            } else if (currentType === 'gallery') {
                if (document.fullscreenElement) {
                    renderGallerySlide();
                } else {
                    renderGalleryScroll();
                }
            }
        });

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('assetModal').classList.contains('active') || !document.fullscreenElement) return;
            
            if (currentType === 'motivation' || currentType === 'technical') {
                if (e.key === 'ArrowRight' || e.key === ' ') {
                    if (pdfDoc && pageNum < pdfDoc.numPages) { pageNum++; queueRenderPage(pageNum); }
                } else if (e.key === 'ArrowLeft') {
                    if (pdfDoc && pageNum > 1) { pageNum--; queueRenderPage(pageNum); }
                }
            } else if (currentType === 'gallery') {
                if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
                else if (e.key === 'ArrowLeft') prevSlide();
            }
        });

        function openModal(event, type) {
            const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
            const isSmallScreen = window.innerWidth <= 1180;
            
            if (isTouchDevice || isSmallScreen) {
                // Mobile behavior: Open PDFs and Gallery in new tab
                if (type === 'motivation' || type === 'technical' || type === 'gallery') return; 
                if (type === 'qr' || type === 'video') event.preventDefault();
            } else {
                if (type !== 'github') event.preventDefault();
            }

            if (type === 'github') return;

            const body = document.getElementById('modalBody');
            const controls = document.getElementById('pdfControls');
            const fullscreenBtn = document.getElementById('fullscreenBtn');
            body.innerHTML = '';
            controls.style.display = 'none';
            fullscreenBtn.style.display = 'flex'; // Restore for all types (QR, PDF, Video)
            currentType = type;
            
            if (type === 'qr') {
                body.innerHTML = `<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center;">
                    <img src="qrcode.png" class="qr-image" style="width: 280px; height: 280px; border-radius: 20px; border: 4px solid rgba(255,255,255,0.1); margin-bottom: 25px; box-shadow: 0 0 40px rgba(56, 189, 248, 0.2); transition: all 0.4s ease;">
                    <h2 class="qr-title" style="color: var(--neon-cyan); margin-bottom: 15px; font-size: 32px; transition: all 0.4s ease;">即刻體驗</h2>
                    <p class="qr-desc" style="color: var(--text-secondary); font-size: 18px; transition: all 0.4s ease;">請掃描 QR Code 隨時同步觀看內容</p></div>`;
            } else if (type === 'motivation' || type === 'technical' || type === 'history') {
                let pdfUrl;
                if (type === 'motivation') pdfUrl = '行動平台動機與理念簡報.pdf';
                else if (type === 'technical') pdfUrl = '行動平台技術概念簡報.pdf';
                else pdfUrl = '開發過程經歷簡報.pdf';
                
                body.innerHTML = '<div style="color: var(--neon-cyan); font-size: 18px;">載入資源中...</div>';
                
                pdfjsLib.getDocument(pdfUrl).promise.then((pdfDoc_) => {
                    pdfDoc = pdfDoc_;
                    document.getElementById('page_count').textContent = pdfDoc.numPages;
                    pageNum = 1;
                    renderAllPages(); // Start in scrolling mode
                });
            } else if (type === 'video') {
                body.innerHTML = `
                    <div style="width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative;">
                        <div style="width: 100%; max-width: 900px; position: relative; padding-top: 40px;">
                            <video id="demo-video" controls autoplay style="width: 100%; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
                                <source src="行動平台影片v2.mp4" type="video/mp4">
                            </video>
                            <h2 style="color: var(--neon-purple); margin-top: 20px; text-align: center; font-size: 24px;">操作演示影片</h2>
                        </div>
                    </div>
                `;
            } else if (type === 'gallery') {
                currentSlide = 0;
                renderGalleryScroll();
            }
            
            document.getElementById('assetModal').classList.add('active');
        }

        const galleryImgs = ['img4.jpg', 'img5.jpg', 'img1.jpg', 'img2.png', 'img7.jpg', 'img6.jpg'];

        function renderGalleryScroll() {
            const body = document.getElementById('modalBody');
            body.innerHTML = `<div class="gallery-scroll-container">
                ${galleryImgs.map(src => `<img src="${src}" class="gallery-scroll-item">`).join('')}
                <p style="color: var(--text-secondary); margin: 40px 0;">已捲動至底部</p>
            </div>`;
        }

        function renderGallerySlide() {
            const body = document.getElementById('modalBody');
            body.innerHTML = `
                <div class="gallery-container">
                    ${galleryImgs.map((src, i) => `<img src="${src}" class="gallery-image ${i === currentSlide ? 'active' : ''}" onclick="nextSlide()">`).join('')}
                    <div class="gallery-nav">
                        <button onclick="prevSlide()" class="pdf-btn"><i class="fa-solid fa-chevron-left"></i></button>
                        <div id="dot-container" style="display: flex; gap: 8px;">
                            ${galleryImgs.map((_, i) => `<div class="dot ${i === currentSlide ? 'active' : ''}"></div>`).join('')}
                        </div>
                        <button onclick="nextSlide()" class="pdf-btn"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                    <div style="position: absolute; bottom: 85px; width: 100%; text-align: center;">
                        <p style="color: var(--text-secondary); font-size: 14px; margin: 0; background: rgba(0,0,0,0.3); display: inline-block; padding: 5px 15px; border-radius: 15px; backdrop-filter: blur(5px);">
                            全螢幕模式：點擊圖片或箭頭切換亮點 (精選 6 張)
                        </p>
                    </div>
                </div>
            `;
        }

        let currentSlide = 0;
        function updateDots() {
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentSlide);
            });
        }

        function nextSlide() {
            const slides = document.querySelectorAll('.gallery-image');
            if (slides.length === 0) return;
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
            updateDots();
        }

        function prevSlide() {
            const slides = document.querySelectorAll('.gallery-image');
            if (slides.length === 0) return;
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide - 1 + slides.length) % slides.length;
            slides[currentSlide].classList.add('active');
            updateDots();
        }

        function closeModal() {
            document.getElementById('assetModal').classList.remove('active');
            document.getElementById('modalBody').innerHTML = '';
            document.getElementById('pdfControls').style.display = 'none';
            pdfDoc = null;
            if (document.fullscreenElement) document.exitFullscreen();
        }

        function toggleFullscreen() {
            const container = document.getElementById('modalContainer');
            if (!document.fullscreenElement) {
                container.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>

</body>
</html>
