<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrition Tracker Pro - 核心功能介面預覽</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Gaegu:wght@400;700&family=Inter:wght@400;600;700&family=Klee+One:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0c0c0c;
            --text-primary: #f8fafc;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --neon-cyan: #38bdf8;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Blobs - Match Presentation Style */
        .background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
        }
        .blob {
            position: absolute;
            width: 500px; height: 500px;
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.2) 0%, rgba(59, 130, 246, 0.2) 100%);
            filter: blur(80px);
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }
        .blob-2 {
            top: 40%; left: 60%;
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.15) 0%, rgba(236, 72, 153, 0.15) 100%);
            animation-duration: 25s;
        }
        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 50px) scale(1.1); }
        }

        header {
            width: 100%;
            padding: 40px 20px;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-family: 'Klee One', cursive;
            font-size: 36px;
            margin: 0;
            color: #fff;
            letter-spacing: 2px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .gallery-list {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 40px;
            z-index: 5;
        }

        .gallery-item {
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 2px solid var(--glass-border);
            /* Sketchy Uneven Border-Radius */
            border-radius: 15px 185px 15px 225px/225px 15px 185px 15px;
            overflow: hidden;
            box-shadow: 15px 15px 0px rgba(0,0,0,0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .gallery-item:hover {
            transform: scale(1.02) rotate(1deg);
            box-shadow: 25px 25px 0px rgba(0,0,0,0.4);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            border-bottom: 2px solid var(--glass-border);
        }

        .info {
            padding: 25px;
            font-size: 16px;
            color: var(--text-secondary);
            text-align: center;
            font-family: 'Gaegu', cursive;
            letter-spacing: 1px;
        }

        .back-btn {
            margin: 50px 0;
            padding: 18px 45px;
            background: #fff; /* High contrast ink style */
            border-radius: 95px 15px 105px 15px/15px 105px 15px 95px;
            color: #000;
            text-decoration: none;
            font-size: 20px;
            font-weight: 700;
            font-family: 'Gaegu', cursive;
            border: 2px solid #000;
            box-shadow: 6px 6px 0px rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn:hover {
            transform: scale(1.08) rotate(-2deg);
            background: var(--neon-cyan);
            box-shadow: 10px 10px 0px rgba(0,0,0,0.5);
        }

        footer {
            width: 100%;
            padding: 60px 20px;
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 14px;
            font-family: 'Gaegu', cursive;
            letter-spacing: 1.5px;
            background: rgba(0, 0, 0, 0.4);
            margin-top: auto;
        }

        /* Loading Animation Support */
        .fade-in {
            animation: fadeIn 1s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            h1 { font-size: 28px; }
            .gallery-list { padding: 15px; }
            .gallery-item { border-radius: 10px 80px 10px 80px/80px 10px 80px 10px; }
        }
    </style>
</head>
<body>
    <div class="background">
        <div class="blob"></div>
        <div class="blob blob-2"></div>
    </div>

    <header class="fade-in">
        <h1>核心功能介面預覽</h1>
    </header>
    
    <div class="gallery-list fade-in">
        <div class="gallery-item"><img src="img4.jpg" alt="Profile Setting"></div>
        <div class="gallery-item"><img src="img5.jpg" alt="Forum/Logout"></div>
        <div class="gallery-item"><img src="img1.jpg" alt="Dashboard"></div>
        <div class="gallery-item"><img src="img2.png" alt="Tracking"></div>
        <div class="gallery-item"><img src="img7.jpg" alt="Feature highlight"></div>
        <div class="gallery-item"><img src="img6.jpg" alt="Last preview"></div>
    </div>

    <div class="info fade-in">💡 小技巧：請在圖片上雙指縮放查看細節</div>
    
    <a href="index.html" class="back-btn fade-in"><i class="fa-solid fa-arrow-left"></i> 返回展示入口</a>

    <footer class="fade-in">
        © 2026 Benson Hong. All Rights Reserved.
    </footer>

    <script>
        document.querySelectorAll('.gallery-item').forEach((item, index) => {
            item.style.animationDelay = (index * 0.15) + 's';
        });
    </script>
</body>
</html>
